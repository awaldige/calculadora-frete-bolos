<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cake Delivery Pro</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <header>

      <div class="logo">
        <i class="fa-solid fa-cake-candles"></i>
        <h1>Cake Delivery Pro</h1>
      </div>

      <p>
        Faça seu pedido e calcule o frete instantaneamente.
      </p>

    </header>

    <section class="card">

      <div class="input-group">
        <label>Nome</label>
        <input type="text" id="nome">
      </div>

      <div class="input-group">
        <label>Telefone</label>
        <input type="text" id="telefone">
      </div>

      <div class="input-group">
        <label>Tipo de Bolo</label>

        <select id="bolo">
          <option value="Chocolate">Chocolate</option>
          <option value="Morango">Morango</option>
          <option value="Prestígio">Prestígio</option>
          <option value="Ninho">Ninho</option>
        </select>
      </div>

      <div class="input-group">
        <label>Peso (kg)</label>
        <input type="number" id="peso" value="1">
      </div>

      <div class="input-group">
        <label>Distância (km)</label>
        <input type="number" id="distancia" value="5">
      </div>

      <button onclick="calcularFrete()">
        <i class="fa-solid fa-truck"></i>
        Calcular Pedido
      </button>

      <div class="resultado" id="resultado"></div>

    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
