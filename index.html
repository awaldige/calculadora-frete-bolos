<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Delivery Pro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <div class="logo">
                <i class="fa-solid fa-cake-candles"></i>
                <h1>Cake Delivery Pro</h1>
            </div>
            <p>Faça seu pedido e calcule o frete instantaneamente.</p>
        </header>

        <form id="form-pedido" class="card" novalidate>

            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="input-group">
                <label for="telefone">Telefone / WhatsApp</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
            </div>

            <div class="input-group">
                <label for="endereco">Endereço (Rua, Nº, Apto)</label>
                <input type="text" id="endereco" placeholder="Ex: Av. Paulista, 1000" required>
            </div>

            <div class="input-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" placeholder="Ex: Centro" required>
            </div>

            <div class="input-group">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" rows="3" placeholder="Ex: sem açúcar, entrega urgente, escrever 'Parabéns' no bolo..."></textarea>
            </div>

            <div class="input-group">
                <label for="bolo">Tipo de Bolo</label>
                <select id="bolo" required>
                    <option value="Chocolate" data-preco="50">Chocolate - R$ 50,00</option>
                    <option value="Morango" data-preco="60">Morango - R$ 60,00</option>
                    <option value="Prestigio" data-preco="70">Prestígio - R$ 70,00</option>
                    <option value="Ninho" data-preco="80">Ninho - R$ 80,00</option>
                </select>
            </div>

            <div class="input-group">
                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso" value="1" min="1" step="0.5" required>
            </div>

            <div class="input-group">
                <label for="distancia">Distância (km)</label>
                <input type="number" id="distancia" value="5" min="0" step="0.1" required>
            </div>

            <button type="submit" id="btn-calcular">
                <i class="fa-solid fa-truck"></i>
                Calcular Pedido
            </button>

            <div class="resultado" id="resultado" style="display: none;"></div>

            <a id="whatsappBtn" class="btn-whatsapp" target="_blank" style="display: none;">
                <i class="fa-brands fa-whatsapp"></i>
                Enviar via WhatsApp
            </a>

        </form>

    </div>

    <script type="module" src="script.js"></script>

</body>

</html>
