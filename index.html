
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Delivery Pro</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>

            <div class="logo">
                <i class="fa-solid fa-cake-candles"></i>
                <h1>Cake Delivery Pro</h1>
            </div>

            <p>
                Faça seu pedido e calcule o frete instantaneamente.
            </p>

        </header>

        <section class="card">

            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="nome">
            </div>

            <div class="input-group">
                <label>Telefone</label>
                <input type="text" id="telefone">
            </div>
            <div class="input-group">
    <label>Endereço</label>
    <input type="text" id="endereco">
</div>

<div class="input-group">
    <label>Bairro</label>
    <input type="text" id="bairro">
</div>
            <div class="input-group">
    <label>Observações</label>
    <textarea id="observacoes"></textarea>
</div>

            <div class="input-group">
                <label>Tipo de Bolo</label>

                <select id="bolo">
                    <option value="Chocolate" data-preco="50">
                        Chocolate - R$ 50,00
                    </option>

                    <option value="Morango" data-preco="60">
                        Morango - R$ 60,00
                    </option>

                    <option value="Prestigio" data-preco="70">
                        Prestígio - R$ 70,00
                    </option>

                    <option value="Ninho" data-preco="80">
                        Ninho - R$ 80,00
                    </option>
                </select>
            </div>

            <div class="input-group">
                <label>Peso (kg)</label>
                <input type="number" id="peso" value="1" min="1">
            </div>

            <div class="input-group">
                <label>Distância (km)</label>
                <input type="number" id="distancia" value="5" min="0">
            </div>

            <button type="button" onclick="calcularFrete()">
                <i class="fa-solid fa-truck"></i>
                Calcular Pedido
            </button>

            <div class="resultado" id="resultado"></div>

            <a
                id="whatsappBtn"
                target="_blank"
                style="display:none;"
            >
                <button type="button">
                    <i class="fa-brands fa-whatsapp"></i>
                    Fazer Pedido
                </button>
            </a>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
