<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Delivery Pro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <div class="logo">
                <i class="fa-solid fa-cake-candles"></i>
                <h1>Cake Delivery Pro</h1>
            </div>
            <p>Faça seu pedido e monte seu carrinho de bolos instantaneamente.</p>
        </header>

        <form id="form-pedido" class="card" novalidate>

            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="input-group">
                <label for="telefone">Telefone / WhatsApp</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
            </div>

            <div class="input-group">
                <label for="endereco">Endereço (Rua, Nº, Apto)</label>
                <input type="text" id="endereco" placeholder="Ex: Av. Paulista, 1000" required>
            </div>

            <div class="input-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" placeholder="Ex: Centro" required>
            </div>

            <div class="input-group">
                <label for="observacoes">Observações Gerais</label>
                <textarea id="observacoes" rows="3" placeholder="Ex: Entrega urgente, portaria liberada..."></textarea>
            </div>

            <div class="secao-bolos">
                <h3>🎂 Monte seu Pedido</h3>
                
                <div class="input-group">
                    <label for="bolo">Sabor do Bolo</label>
                    <select id="bolo">
                        <option value="Chocolate" data-preco="50">Chocolate - R$ 50,00</option>
                        <option value="Morango" data-preco="60">Morango - R$ 60,00</option>
                        <option value="Prestigio" data-preco="70">Prestígio - R$ 70,00</option>
                        <option value="Ninho" data-preco="80">Ninho - R$ 80,00</option>
                        <option value="Red Velvet" data-preco="85">Red Velvet - R$ 85,00</option>
                        <option value="Doce de Leite" data-preco="65">Doce de Leite - R$ 65,00</option>
                        <option value="Cenoura com Brigadeiro" data-preco="55">Cenoura com Brigadeiro - R$ 55,00</option>
                        <option value="Abacaxi com Coco" data-preco="65">Abacaxi com Coco - R$ 65,00</option>
                        <option value="Maracujá" data-preco="60">Maracujá - R$ 60,00</option>
                        <option value="Limão Siciliano" data-preco="60">Limão Siciliano - R$ 60,00</option>
                        <option value="Nozes com Baba de Moça" data-preco="90">Nozes com Baba de Moça - R$ 90,00</option>
                        <option value="Floresta Negra" data-preco="75">Floresta Negra - R$ 75,00</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="peso">Peso (kg)</label>
                    <input type="number" id="peso" value="1" min="1" step="0.5">
                </div>

                <button type="button" id="btn-adicionar-bolo" class="btn-secundario">
                    <i class="fa-solid fa-plus"></i> Adicionar Bolo ao Pedido
                </button>
            </div>

            <div id="lista-bolos-escolhidos" class="lista-carrinho" style="display: none;">
                <h4>Bolos no Carrinho:</h4>
                <ul id="itens-carrinho"></ul>
            </div>

            <div class="resultado" id="resultado" style="display: none;"></div>

            <a id="whatsappBtn" class="btn-whatsapp" target="_blank" style="display: none;">
                <i class="fa-brands fa-whatsapp"></i>
                Enviar via WhatsApp
            </a>

        </form>

    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
